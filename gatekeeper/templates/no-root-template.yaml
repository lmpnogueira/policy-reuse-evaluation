# ConstraintTemplate: K8sNoRoot
# Enforces P1 - containers must set securityContext.runAsNonRoot to true.
# Gatekeeper evaluates this Rego at admission time against every matching resource.

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snoroot
spec:
  crd:
    spec:
      names:
        kind: K8sNoRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snoroot

        violation[{"msg": msg}] {
          container := input.review.object.spec.template.spec.containers[_]
          not container.securityContext.runAsNonRoot == true
          msg := sprintf("Container '%s' must set securityContext.runAsNonRoot to true", [container.name])
        }
