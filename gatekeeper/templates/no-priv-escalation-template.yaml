# ConstraintTemplate: K8sNoPrivEscalation
# Enforces P2 - containers must set allowPrivilegeEscalation to false.
# Gatekeeper evaluates this Rego at admission time against every matching resource.

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snoprivescalation
spec:
  crd:
    spec:
      names:
        kind: K8sNoPrivEscalation
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snoprivescalation

        violation[{"msg": msg}] {
          container := input.review.object.spec.template.spec.containers[_]
          not container.securityContext.allowPrivilegeEscalation == false
          msg := sprintf("Container '%s' must set securityContext.allowPrivilegeEscalation to false", [container.name])
        }
