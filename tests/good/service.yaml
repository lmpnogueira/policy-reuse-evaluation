# Negative control: Service
# Expected: PASS - policies only evaluate container specs
# Purpose: Confirm policies do not false-positive on non-workload resources

apiVersion: v1
kind: Service
metadata:
  name: app-service
  labels:
    app: secure-app
spec:
  type: ClusterIP
  selector:
    app: secure-app
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
