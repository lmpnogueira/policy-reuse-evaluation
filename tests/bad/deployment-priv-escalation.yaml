# Violates P2: allowPrivilegeEscalation is true
# Expected: FAIL on no-priv-escalation.rego only

apiVersion: apps/v1
kind: Deployment
metadata:
  name: escalated-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escalated-app
  template:
    metadata:
      labels:
        app: escalated-app
    spec:
      containers:
        - name: app
          image: nginx:1.25.3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: true   # violation
            privileged: false