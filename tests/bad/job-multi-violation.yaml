# Violation: Job with P1 + P3 + P4 - multiple policy violations
# Expected: FAIL - violations for root, latest tag, and missing resources
# Purpose: Verify multi-violation detection on Job resource type

apiVersion: batch/v1
kind: Job
metadata:
  name: migration-bad
  labels:
    app: migration-bad
spec:
  template:
    metadata:
      labels:
        app: migration-bad
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: flyway/flyway:latest
          args: ["migrate"]
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
