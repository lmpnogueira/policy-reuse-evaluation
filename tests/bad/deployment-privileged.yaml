# Violates P5: privileged is true
# Expected: FAIL on no-privileged.rego only

apiVersion: apps/v1
kind: Deployment
metadata:
  name: privileged-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: privileged-app
  template:
    metadata:
      labels:
        app: privileged-app
    spec:
      containers:
        - name: app
          image: nginx:1.25.3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: true   # violation