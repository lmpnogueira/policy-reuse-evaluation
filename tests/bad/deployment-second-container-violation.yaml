# Violation: P4 - second container uses :latest tag, first is compliant
# Expected: FAIL - 1 violation (sidecar image uses :latest)
# Purpose: Verify per-container iteration catches violations in non-first containers

apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-container-bad
  labels:
    app: second-container-bad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: second-container-bad
  template:
    metadata:
      labels:
        app: second-container-bad
    spec:
      containers:
        - name: app
          image: python:3.12-slim
          command: ["python", "-m", "http.server", "8080"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        - name: sidecar
          image: fluentd:latest
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
