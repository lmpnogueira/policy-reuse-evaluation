# Violation: P1 + P2 + P4 - three distinct policy violations
# Expected: FAIL - 3 violations (root, escalation, latest tag)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: three-violations
  labels:
    app: three-violations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: three-violations
  template:
    metadata:
      labels:
        app: three-violations
    spec:
      containers:
        - name: app
          image: nginx:latest
          ports:
            - containerPort: 80
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
