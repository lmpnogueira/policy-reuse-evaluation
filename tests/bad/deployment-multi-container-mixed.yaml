# Violation: Multi-container with mixed compliance
# Container A: fully compliant
# Container B: P1 + P4 + P3 (root, no tag, missing resources)
# Expected: FAIL - multiple violations from container B only

apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-container-mixed
  labels:
    app: multi-container-mixed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-container-mixed
  template:
    metadata:
      labels:
        app: multi-container-mixed
    spec:
      containers:
        - name: app
          image: python:3.12-slim
          command: ["python", "-m", "http.server", "8080"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        - name: sidecar
          image: fluentbit
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources: {}
